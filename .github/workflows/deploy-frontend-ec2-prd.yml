name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'angular.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tailwind.config.js'
      - 'tsconfig*.json'
      - 'postcss.config.*'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: PRD

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Inject environment variables into environment.prod.ts
        env:
          API_BASE_URL: ${{ vars.apiBaseUrl }}
          WS_BASE_URL: ${{ vars.wsBaseUrl }}
          KEYCLOAK_URL: ${{ vars.keycloakUrl }}
          FRONTEND_BUILD_COMMIT: ${{ github.sha }}
        run: |
          sed -i "s|__API_BASE_URL__|$API_BASE_URL|g" src/environments/environment.prod.ts
          sed -i "s|__WS_BASE_URL__|$WS_BASE_URL|g" src/environments/environment.prod.ts
          sed -i "s|__KEYCLOAK_URL__|$KEYCLOAK_URL|g" src/environments/environment.prod.ts
          sed -i "s|__FRONTEND_BUILD_COMMIT__|$FRONTEND_BUILD_COMMIT|g" src/environments/environment.prod.ts
          echo "✅ environment.prod.ts after substitution:"
          cat src/environments/environment.prod.ts

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build -- --configuration production

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/ec2_key.pem
          chmod 600 /tmp/ec2_key.pem
          rsync -avz --delete \
            -e "ssh -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no" \
            dist/myproperty-frontend/browser/ \
            $EC2_USER@$EC2_HOST:/var/www/mybuilding.ca/
          rm -f /tmp/ec2_key.pem

      - name: Verify deployment
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/ec2_key.pem
          chmod 600 /tmp/ec2_key.pem
          ssh -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no \
            $EC2_USER@$EC2_HOST \
            "ls -lh /var/www/mybuilding.ca/index.html && echo '✅ Frontend deployed successfully'"
          rm -f /tmp/ec2_key.pem