spring:
  application:
    name: myproperty-management-dev
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  datasource:
    url: jdbc:postgresql://ep-restless-field-aff9ioif-pooler.c-2.us-west-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require
    username: neondb_owner
    password: npg_sJxv9OTo1XDa
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8083/realms/myproperty
          jwk-set-uri: http://localhost:8083/realms/myproperty/protocol/openid-connect/certs

keycloak:
  realm: myproperty
  auth-server-url: http://localhost:8083
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:myproperty-springboot-backend}
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:HpV2u6cTtxgEZ8wyECSIyFeKOJEum0m0}
  resource: property-backend
  credentials:
    secret: dev-client-secret
  use-resource-role-mappings: true
  bearer-only: true

server:
  port: 8081
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always
    include-exception: true

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    enabled: true

logging:
  level:
    root: INFO
    com.myproperty: DEBUG
    org.springframework.security: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/myproperty-dev.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

app:
  chat:
    kafka:
      publish-enabled: false
      topic: chat-messages
  db:
    cleanup:
      enabled: false
    seed:
      enabled: true
      reset-first: false
  kafka:
    topics:
      building-events: building-events
      maintenance-events: maintenance-events
      compliance-events: compliance-events
      communication-events: communication-events
      financial-events: financial-events
      incident-events: incident-events
      iot-events: iot-events
  building:
    compliance:
      default-reminder-days: 7
      reminder-cron: "0 */30 * * * *"
    sse-heartbeat-ms: 30000

