spring:
  application:
    name: myproperty-management-prod

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://prod-db-host:5432/myproperty_prod}
    username: ${DATABASE_USERNAME:myproperty_user}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:prod-kafka-broker:9092}
    consumer:
      group-id: myproperty-prod-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        max.poll.records: 100
        session.timeout.ms: 30000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    topics:
      property-events: property-events
      invoice-events: invoice-events
      notification-events: notification-events
      audit-events: audit-events

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://keycloak.myproperty.com/realms/myproperty}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:https://keycloak.myproperty.com/realms/myproperty/protocol/openid-connect/certs}

  mvc:
    servlet:
      path: /api

keycloak:
  realm: myproperty
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:https://keycloak.myproperty.com}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}
  resource: property-backend
  credentials:
    secret: ${KEYCLOAK_CLIENT_SECRET}
  use-resource-role-mappings: true
  bearer-only: true

server:
  port: ${PORT:${SERVER_PORT:8081}}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: WARN
    com.myproperty: INFO
    org.springframework.security: WARN
    org.springframework.kafka: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/myproperty/application.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 3GB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080,http://localhost:8081}
  websocket:
    allowed-origin-patterns: ${APP_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://localhost:8081}
  chat:
    kafka:
      publish-enabled: true
      topic: chat-messages

